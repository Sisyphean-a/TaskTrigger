dod:
  commands:
    - id: CMD-001
      command: "gradlew.bat testDebugUnitTest"
      core: true
      failure_handling: document-baseline
    - id: CMD-002
      command: "gradlew.bat assembleDebug"
      core: true
      failure_handling: document-baseline
  evidence_required: [command_output, diff_summary, screenshot]
